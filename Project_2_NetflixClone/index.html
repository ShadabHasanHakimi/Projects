<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix India – Watch TV Shows Online, Watch Movies Online</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="main" style="background-image: url(./Assets/images/bg.jpg)">
      <div class="nav">
        <nav>
          <span><img width="53" src="./Assets/images/logol.svg" alt="" /></span>
          <div>
            <button class="btn">
              <i class="fa-solid fa-language"></i> English
              <i class="fa-solid fa-caret-down dropdown"></i>
            </button>
            <button class="btn btn-red-sm">Sign in</button>
          </div>
        </nav>
      </div>

      <div class="box"></div>

      <div class="text">
        <div class="first">Welcome!</div>
        <div class="second">
          <h2>The biggest Indian hits. The best Indian</h2>
          <h2>stories.All streaming here.</h2>
        </div>
        <div class="third">Watch anywhere. Cancel anytime.</div>
        <div class="fourth">
          Ready to watch? Enter your email to create or restart your membership.
        </div>
        <div>
          <input type="text" placeholder="Email Address" />
          <button class="btn btn-red">
            Get Started <i class="fa-regular fa-greater-than"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="separation"></div>

    <section class="firstSec">
      <div>
        Enjoy on your TV 
        Watch on smart TVs, PlayStation, Xbox, 
        Chromecast, Apple TV, Blu-ray players and more.
      </div>

      <div class="secImg">
        <img src="./Assets/images/" alt="">
      </div>
    </section>
  </body>
</html>
